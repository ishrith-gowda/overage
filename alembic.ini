# alembic.ini — Alembic migration configuration for Overage.
# The sqlalchemy.url is overridden at runtime by alembic/env.py
# which reads from the DATABASE_URL environment variable.

[alembic]
script_location = proxy/storage/migrations
prepend_sys_path = .
# Use the async driver for migrations
sqlalchemy.url = sqlite+aiosqlite:///./overage_dev.db

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
