# .github/workflows/cd-api.yml — Continuous Deployment pipeline
# Deploys the proxy API to production after CI passes on main.
# Strategy: build Docker → push to GHCR → deploy to Railway → smoke test.
# Reference: ARCHITECTURE.md Section 8 (Deployment Architecture)

name: CD — Deploy API

on:
  push:
    branches: [main]
    # Only deploy when proxy code or infra changes (not docs-only changes)
    paths:
      - "proxy/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "requirements*.txt"
      - "alembic/**"
      - ".github/workflows/cd-api.yml"

# Never run two deployments concurrently
concurrency:
  group: deploy-production
  cancel-in-progress: false  # Let the current deploy finish

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Only deploy if CI passed (this workflow triggers on push, CI also triggers)
    # We rely on branch protection rules requiring CI to pass before merge.
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Railway deployment via webhook trigger
          # Alternative: `npx @railway/cli deploy` if CLI is preferred
          curl -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            "${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}" \
            --fail --silent --show-error

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Post-deploy smoke test
        env:
          DEPLOY_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          echo "Running smoke test against $DEPLOY_URL/health"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" --max-time 15)
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Smoke test failed! Health check returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Smoke test passed (HTTP $HTTP_STATUS)"

      - name: Notify on failure
        if: failure()
        run: |
          # Send failure notification via Discord webhook
          # NOTE: We do NOT auto-rollback — deployment issues require manual investigation
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"🚨 **Overage deploy failed** on commit \`${{ github.sha }}\` by ${{ github.actor }}. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
