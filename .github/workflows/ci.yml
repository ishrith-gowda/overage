# .github/workflows/ci.yml — Main CI pipeline
# Runs on every PR and push to main (plus weekly schedule). Rough shape:
#   lint → typecheck → test;  security (parallel after lint);
#   foundation-quickstart (parallel; Phase 0.10 install + test_api gate);
#   docker-build (+ Trivy) after test + foundation-quickstart succeed.
# If lint fails, every job that needs lint (or needs a downstream job) is skipped
# until the failure is fixed — that is normal GitHub Actions behavior, not "optional" CI.
# Reference: INSTRUCTIONS.md Section 9 (Git Workflow)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly container CVE signal (same cadence as former Security workflow Trivy job).
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

# Cancel in-progress runs for the same PR to save compute. New pushes can cancel a long
# Docker build mid-run (shows as "cancelled"). If that happens, wait for the latest run only.
# Main-branch pushes are never cancelled in progress.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Disable ML model loading in CI (not needed for proxy tests)
  ESTIMATION_ENABLED: "false"
  DATABASE_URL: "sqlite+aiosqlite:///./test.db"
  DD_TRACE_ENABLED: "false"
  DD_INSTRUMENTATION_TELEMETRY_ENABLED: "false"

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Lint — ruff check + format verification
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-lint-${{ runner.os }}-

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # -----------------------------------------------------------------------
  # Job 2: Type Check — mypy strict mode
  # -----------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-typecheck-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-typecheck-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy proxy/ --strict

  # -----------------------------------------------------------------------
  # Job 3: Test — pytest with coverage
  # -----------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-test-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-test-${{ runner.os }}-

      - name: Install dependencies
        # `.[dev]` only — torch/transformers not needed for pytest (PALACE is lazy-imported).
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest proxy/tests/ \
            -v \
            --cov=proxy \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=55 \
            --timeout=60 \
            -m "not slow" \
            --junitxml=junit.xml \
            -o junit_family=legacy

      # Upload on PR and main; use always() so uploads run when pytest fails (JUnit + partial cov).
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() && always() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
          handle_no_reports_found: true

      - name: Upload test results to Codecov (Test Analytics)
        if: ${{ !cancelled() && always() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: junit.xml
          fail_ci_if_error: false
          handle_no_reports_found: true

  # -----------------------------------------------------------------------
  # Foundation quickstart — Phase 0.10 machine gate (pip install .[dev] + API tests ≤300s)
  # -----------------------------------------------------------------------
  foundation-quickstart:
    name: Foundation quickstart
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-foundation-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-foundation-${{ runner.os }}-

      - name: Story 7 smoke (install + pytest proxy/tests/test_api.py)
        run: chmod +x scripts/verify_quickstart_budget.sh && ./scripts/verify_quickstart_budget.sh

  # -----------------------------------------------------------------------
  # Job 4: Security — bandit + detect-secrets + pip-audit (runs in parallel with test)
  # -----------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit "detect-secrets>=1.5,<2.0" "pip-audit>=2.7,<3.0"

      - name: Run bandit (security linter)
        run: bandit -r proxy/ -ll -ii --exclude proxy/tests

      - name: Run detect-secrets (baseline scan)
        run: detect-secrets scan --baseline .secrets.baseline

      - name: Install project (runtime + dev) for pip-audit
        run: pip install -e ".[dev]"

      - name: Run pip-audit (dependency vulnerability scan)
        run: pip-audit --progress-spinner off
        continue-on-error: true  # Advisory triage; does not block merges

  # -----------------------------------------------------------------------
  # Job 5: Docker Build — verify the image builds successfully
  # -----------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, foundation-quickstart]
    # Wheel-first installs should finish in <15m when GHA layer cache is warm; allow cold cache + Trivy.
    timeout-minutes: 60
    # Runs after tests on every workflow trigger (PR and push to main).
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: overage:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_ML=false
            OVERAGE_DOCKER_MINIMAL=true

      - name: Run Trivy vulnerability scanner
        if: success()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "overage:ci-${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"
