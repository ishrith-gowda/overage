# .github/workflows/ci.yml — Main CI pipeline
# Runs on every PR and push to main. Jobs form a dependency chain:
#   lint → typecheck → test (+ security in parallel) → docker-build
# Reference: INSTRUCTIONS.md Section 9 (Git Workflow)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same PR/branch to save compute.
# Pushes to main always run to completion.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  # Disable ML model loading in CI (not needed for proxy tests)
  ESTIMATION_ENABLED: "false"
  DATABASE_URL: "sqlite+aiosqlite:///./test.db"

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Lint — ruff check + format verification
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-lint-${{ runner.os }}-

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # -----------------------------------------------------------------------
  # Job 2: Type Check — mypy strict mode
  # -----------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-typecheck-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-typecheck-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy proxy/ --strict

  # -----------------------------------------------------------------------
  # Job 3: Test — pytest with coverage
  # -----------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-test-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest proxy/tests/ \
            -v \
            --cov=proxy \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            --timeout=60 \
            -m "not slow"

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # -----------------------------------------------------------------------
  # Job 4: Security — bandit + safety (runs in parallel with test)
  # -----------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Run bandit (security linter)
        run: bandit -r proxy/ -ll -ii --exclude proxy/tests

      - name: Run safety (dependency vulnerability check)
        run: safety check --output text
        continue-on-error: true  # Don't block on advisory-only vulns

  # -----------------------------------------------------------------------
  # Job 5: Docker Build — verify the image builds successfully
  # -----------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    # Only build Docker on pushes to main or when Dockerfile changes in a PR
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: overage:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
