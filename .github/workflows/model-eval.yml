# .github/workflows/model-eval.yml — PALACE model evaluation pipeline
# Runs on manual dispatch or when model/ directory changes.
# Evaluates the PALACE LoRA model on benchmark datasets and reports
# Pass@1 accuracy at 10%, 30%, 50% error thresholds.
# Reference: ARCHITECTURE.md Section 7 (Estimation Pipeline)

name: Model Evaluation

on:
  workflow_dispatch:
    inputs:
      model_version:
        description: "Model version to evaluate (e.g., v0.1.0)"
        required: true
        default: "v0.1.0"
      dataset:
        description: "Evaluation dataset"
        required: true
        default: "benchmark_v1"
        type: choice
        options:
          - benchmark_v1
          - benchmark_v2
          - full_eval
  pull_request:
    branches: [main]
    paths:
      - "model/**"
      - "proxy/estimation/**"

jobs:
  evaluate:
    name: Evaluate PALACE Model
    runs-on: ubuntu-latest
    # Use a larger runner if GPU evaluation is needed in the future
    # runs-on: [self-hosted, gpu]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-model-eval-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          # Ensure CPU-only torch for CI (no GPU in GitHub Actions)
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Set evaluation parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "model_version=${{ github.event.inputs.model_version }}" >> "$GITHUB_OUTPUT"
            echo "dataset=${{ github.event.inputs.dataset }}" >> "$GITHUB_OUTPUT"
          else
            echo "model_version=v0.1.0" >> "$GITHUB_OUTPUT"
            echo "dataset=benchmark_v1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run model evaluation
        run: |
          python model/eval/evaluate.py \
            --model-version "${{ steps.params.outputs.model_version }}" \
            --dataset "${{ steps.params.outputs.dataset }}" \
            --thresholds 10 30 50 \
            --output-file model/eval/results/eval_${{ github.sha }}.json \
            --device cpu

      - name: Display evaluation results
        run: |
          echo "## PALACE Model Evaluation Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Model:** ${{ steps.params.outputs.model_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Dataset:** ${{ steps.params.outputs.dataset }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # Parse and display the JSON results as a markdown table
          python -c "
          import json, sys
          with open('model/eval/results/eval_${{ github.sha }}.json') as f:
              data = json.load(f)
          print('| Metric | Value |')
          print('|--------|-------|')
          for k, v in data.get('metrics', {}).items():
              print(f'| {k} | {v} |')
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: model-eval-${{ github.sha }}
          path: model/eval/results/eval_${{ github.sha }}.json
          retention-days: 90

      - name: Comment results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync(
              `model/eval/results/eval_${{ github.sha }}.json`, 'utf8'
            ));
            const metrics = results.metrics || {};
            let body = `## PALACE Model Evaluation\n\n`;
            body += `| Threshold | Pass@1 |\n|-----------|--------|\n`;
            for (const [key, value] of Object.entries(metrics)) {
              body += `| ${key} | ${value} |\n`;
            }
            body += `\n*Model: ${{ steps.params.outputs.model_version }} | Dataset: ${{ steps.params.outputs.dataset }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
