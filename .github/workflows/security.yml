# .github/workflows/security.yml — Security scanning pipeline
# Runs CodeQL analysis and dependency review. Container image scanning (Trivy) runs in
# ci.yml immediately after Docker Build so the image is built once per run (parallel
# Security+CI Docker builds previously hit 60m job timeouts). Branch protection should
# require the CI "Docker Build" job, not a separate "Container Scan".
# Reference: INSTRUCTIONS.md Section 13 (Secrets Management)

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 06:00 UTC to catch newly disclosed CVEs
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -----------------------------------------------------------------------
  # CodeQL — static analysis for security vulnerabilities
  # -----------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          # Use extended queries for more thorough analysis
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  # -----------------------------------------------------------------------
  # Dependency Review — block PRs that introduce critical/high CVEs
  # -----------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          # Allow specific advisories if we've assessed the risk
          # allow-advisories: GHSA-xxxx-yyyy-zzzz
