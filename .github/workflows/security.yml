# .github/workflows/security.yml — Security scanning pipeline
# Runs CodeQL analysis, dependency review, and container scanning.
# CodeQL runs on every push and on a weekly schedule (catches new CVE patterns).
# Reference: INSTRUCTIONS.md Section 13 (Secrets Management)

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 06:00 UTC to catch newly disclosed CVEs
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # -----------------------------------------------------------------------
  # CodeQL — static analysis for security vulnerabilities
  # -----------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # Use extended queries for more thorough analysis
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # -----------------------------------------------------------------------
  # Dependency Review — block PRs that introduce critical/high CVEs
  # -----------------------------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Allow specific advisories if we've assessed the risk
          # allow-advisories: GHSA-xxxx-yyyy-zzzz

  # -----------------------------------------------------------------------
  # Trivy — container image vulnerability scanning
  # -----------------------------------------------------------------------
  trivy:
    name: Container Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: docker build -t overage:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "overage:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
